	<VirtualHost 42.125.249.209:8800>
		DocumentRoot "C:/xampp/htdocs/app_adm/public"
		ServerName jju-777.com

		RewriteEngine On
		
		RewriteCond %{HTTP:Upgrade} websocket               [NC]
		RewriteRule /(.*)           ws://127.0.0.1:9091/$1  	[P]
		
		ProxyRequests Off
		ProxyPass           /ws   http://127.0.0.1:9091
		ProxyPassReverse    /ws   http://127.0.0.1:9091
		
	</VirtualHost>

