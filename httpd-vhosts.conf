	<VirtualHost *:443>

	  DocumentRoot "C:/xampp/htdocs/tiger/public"
		ServerName 42.125.249.209

		SSLEngine on
		SSLCertificateFile "C:/xampp/htdocs/ssl/certificate.crt"
		SSLCertificateKeyFile "C:/xampp/htdocs/ssl/private.key"
		SSLCertificateChainFile "C:/xampp/htdocs/ssl/ca_bundle.crt"

        SSLCipherSuite EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH
        SSLProtocol All -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
		
		
	</VirtualHost>


